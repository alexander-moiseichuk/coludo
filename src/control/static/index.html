<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coludo Control</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 2rem; color: #222; }
  h1 { margin: 0 0 1rem; }
  h2 { margin: 1.5rem 0 .5rem; }
  table { border-collapse: collapse; margin-bottom: 1rem; }
  th, td { border: 1px solid #ccc; padding: .3rem .7rem; text-align: left; }
  th { background: #f4f4f4; }
  tr.click { cursor: pointer; }
  tr.click:hover { background: #f0f6ff; }
  tr.off { color: #999; }
  .dot { font-size: 1.1rem; }
  .on .dot { color: #2a9d3a; }
  .off .dot { color: #bbb; }
  input, button, textarea { font: inherit; padding: .3rem .5rem; }
  textarea { font-family: ui-monospace, monospace; font-size: .85rem; width: 100%; max-width: 60rem; box-sizing: border-box; }
  pre { white-space: pre-wrap; background: #f4f4f4; padding: .6rem; min-height: 1.2rem; border-radius: 4px; max-width: 60rem; }
  .muted { color: #888; font-size: .85rem; }
</style>
</head>
<body>
<div style="display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap;">
  <h1>Coludo Control</h1>
  <span class="muted" id="ccstatus">CC —</span>
</div>

<table id="boards">
  <thead><tr>
    <th>board</th><th>online</th><th>stage</th><th>version</th><th>config</th><th>uptime</th>
    <th>board time</th><th></th><th>position</th><th></th>
  </tr></thead>
  <tbody><tr><td colspan="10" class="muted">waiting for boards…</td></tr></tbody>
</table>
<p class="muted">click a board to target it below · <span id="boardmsg"></span></p>

<h2>send command</h2>
<p>
  <input id="board" placeholder="board id" size="10">
  <select id="cmd" title="board command">
    <option>ping</option>
    <option>health</option>
    <option>report</option>
    <option>objects</option>
    <option>inspect</option>
    <option>stats</option>
    <option>verify</option>
    <option>probe</option>
    <option>stage</option>
    <option>arm</option>
    <option>disarm</option>
    <option>tlm</option>
    <option>update</option>
    <option>whoami</option>
    <option>reboot</option>
  </select>
  <input id="params" placeholder="params — e.g. wifi · gliding · 5000" size="28"
         title="space-separated arguments (e.g. inspect → wifi, stage → gliding, tlm → 5000)">
  <button id="send">send</button>
</p>
<pre id="reply"></pre>

<h2>config &amp; control</h2>
<p>
  <input id="cfgboard" placeholder="board id" size="10">
  <select id="cfgtarget" title="which config to load/save">
    <option value="board">board config</option>
    <option value="launch">launch config</option>
  </select>
  <button id="load">load</button>
  <button id="save">save</button>
  <button id="reboot">reboot</button>
  <button id="reset">reset board config</button>
</p>
<textarea id="config" rows="14" placeholder="config draft — pick board/launch, click load to fetch it as an editable draft, then save (board config needs a reboot to take effect)"></textarea>
<pre id="cfgresult"></pre>

<h2>inspect</h2>
<p>
  <input id="inspboard" placeholder="board id" size="10">
  <button id="inspall">inspect all</button>
  <span class="muted">every Inspectable object + its live properties</span>
</p>
<pre id="inspresult"></pre>

<h2>logs</h2>
<p>
  <input id="logboard" placeholder="board id" size="10">
  <input id="logms" value="1000" size="6" title="poll interval (ms)">
  <button id="logstart">start</button>
  <button id="logstop">stop</button>
  <button id="logclear">clear</button>
</p>
<pre id="logs"></pre>

<script>
const tbody = document.querySelector('#boards tbody');

// POST one command to a board via the hub; returns {board, status, args} (or {error}).
async function cmd(board, command, params = []) {
  const res = await fetch('/api/cmd', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ board, command, params }),
  });
  return res.json();
}

// Parse JSON, or return the original value if it is not JSON (board payloads arrive as JSON strings).
function safeParse(value) {
  if (typeof value !== 'string') return value;
  try { return JSON.parse(value); } catch (e) { return value; }
}

// Pretty-print a command result. The board returns structured payloads as JSON *strings* inside
// args[], so a raw JSON.stringify shows a backslash-escaped wall. Unwrap any arg that is itself JSON
// into a nested object, then format it (2-space, like the config editor).
function prettyResult(result) {
  if (result && Array.isArray(result.args)) {
    result = { ...result, args: result.args.map(safeParse) };
  }
  return JSON.stringify(result, null, 2);
}

function selectBoard(id) {
  document.getElementById('board').value = id;
  document.getElementById('cfgboard').value = id;
  document.getElementById('inspboard').value = id;
  document.getElementById('logboard').value = id;
}

// uptime is milliseconds since boot (board ticks); show it as Hh MMm SSs.
function fmtUptime(ms) {
  if (ms == null) return '';
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 3600)}h${String(Math.floor((s % 3600) / 60)).padStart(2, '0')}m${String(s % 60).padStart(2, '0')}s`;
}
const fmtPos = (p) => (p ? `${p[0].toFixed(5)}, ${p[1].toFixed(5)}` : 'N/A');
// CC GPS: N/A when no device, No FIX until a usable fix, else the coordinates.
function ccGps(gps) {
  if (!gps) return 'N/A';
  if (!gps.usable) return 'No FIX';
  return `${gps.latitude.toFixed(5)}, ${gps.longitude.toFixed(5)}`;
}
const boardMsg = (text) => { document.getElementById('boardmsg').textContent = text; };

new EventSource('/events').onmessage = (event) => {
  const { cc, boards } = JSON.parse(event.data);
  document.getElementById('ccstatus').textContent = `CC ${(cc.time || '').replace('T', ' ')} · GPS ${ccGps(cc.gps)}`;
  const ccHasFix = !!(cc.gps && cc.gps.usable);  // 'sync CC GPS' is offered only when CC has a fix
  if (!boards.length) {
    tbody.innerHTML = '<tr><td colspan="10" class="muted">no boards connected</td></tr>';
    return;
  }
  tbody.innerHTML = boards.map((b) => `
    <tr class="click ${b.online ? 'on' : 'off'}" onclick="selectBoard('${b.id}')">
      <td>${b.id}</td>
      <td><span class="dot">${b.online ? '●' : '○'}</span></td>
      <td>${b.stage || ''}</td>
      <td>${b.version || ''}</td>
      <td>${b.config_id || ''}</td>
      <td>${fmtUptime(b.uptime)}</td>
      <td>${(b.clock || '').replace('T', ' ')}</td>
      <td><button onclick="event.stopPropagation(); syncTime('${b.id}')" title="set the board RTC to the CC clock">sync CC time</button></td>
      <td>${fmtPos(b.position)}</td>
      <td>${ccHasFix
        ? `<button onclick="event.stopPropagation(); gpsAssist('${b.id}')" title="push the CC GPS fix to the board launch config">sync CC GPS</button>`
        : '<span class="muted">—</span>'}</td>
    </tr>`).join('');
};

// top-table actions: set the board RTC from the PC clock (update mission epoch), and push the host
// GPS position to the board launch config (/api/assist).
async function syncTime(id) {
  const r = await cmd(id, 'update', ['mission', JSON.stringify({ epoch: Math.floor(Date.now() / 1000) })]);
  boardMsg(`${id} sync time: ${r.status === 'ok' ? 'ok' : JSON.stringify(r)}`);
}
async function gpsAssist(id) {
  const res = await fetch('/api/assist', {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ board: id }),
  });
  const r = await res.json();
  boardMsg(`${id} gps: ${r.assisted ? 'pushed ' + JSON.stringify(r.position) : JSON.stringify(r)}`);
}

// --- ad-hoc command box: pick a command, type its params (space-separated) ---
async function send() {
  const board = document.getElementById('board').value.trim();
  const command = document.getElementById('cmd').value;
  const raw = document.getElementById('params').value.trim();
  const parts = raw ? raw.split(/\s+/) : [];
  const reply = document.getElementById('reply');
  reply.textContent = '…';
  try {
    reply.textContent = prettyResult(await cmd(board, command, parts));
  } catch (err) {
    reply.textContent = 'error: ' + err;
  }
}
document.getElementById('send').addEventListener('click', send);
document.getElementById('params').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

// --- config editor: pick board/launch -> load (get-config <name>) -> edit -> save (set-config <name>) ---
const cfgOut = document.getElementById('cfgresult');
const cfgArea = document.getElementById('config');
const cfgBoard = () => document.getElementById('cfgboard').value.trim();
const cfgTarget = () => document.getElementById('cfgtarget').value;

document.getElementById('load').onclick = async () => {
  cfgOut.textContent = '…';
  const target = cfgTarget();
  const r = await cmd(cfgBoard(), 'get-config', [target]);
  if (r.status === 'ok') {
    try {
      cfgArea.value = JSON.stringify(JSON.parse(r.args[0]), null, 2);
      cfgOut.textContent = `loaded ${target} config of ${cfgBoard()}`;
    } catch (e) { cfgOut.textContent = 'unreadable config from board: ' + e; }
  } else {
    cfgOut.textContent = prettyResult(r);
  }
};

document.getElementById('save').onclick = async () => {
  let json;
  try { json = JSON.stringify(JSON.parse(cfgArea.value)); }
  catch (e) { cfgOut.textContent = 'draft is not valid JSON: ' + e; return; }
  cfgOut.textContent = '…';
  cfgOut.textContent = prettyResult(await cmd(cfgBoard(), 'set-config', [cfgTarget(), json]));
};

document.getElementById('reboot').onclick = async () => {
  cfgOut.textContent = prettyResult(await cmd(cfgBoard(), 'reboot'));
};

document.getElementById('reset').onclick = async () => {
  cfgOut.textContent = prettyResult(await cmd(cfgBoard(), 'reset-config'));
};

// --- inspect: list objects, then inspect each -> one tree of every Inspectable object ---
const inspOut = document.getElementById('inspresult');
const inspBoard = () => document.getElementById('inspboard').value.trim();

document.getElementById('inspall').onclick = async () => {
  inspOut.textContent = '…';
  const list = await cmd(inspBoard(), 'objects');
  if (list.status !== 'ok' || !Array.isArray(list.args)) { inspOut.textContent = prettyResult(list); return; }
  const names = safeParse(list.args[0]);
  if (!Array.isArray(names)) { inspOut.textContent = prettyResult(list); return; }
  const tree = {};
  for (const name of names) {
    const r = await cmd(inspBoard(), 'inspect', [name]);
    tree[name] = (r.status === 'ok' && Array.isArray(r.args)) ? safeParse(r.args[0]) : r;
  }
  inspOut.textContent = JSON.stringify(tree, null, 2);
};

// --- live log stream: start/stop the hub's per-board stream, then view the /logs SSE feed ---
const logPane = document.getElementById('logs');
const logBoard = () => document.getElementById('logboard').value.trim();

async function setLog(on) {
  const interval_ms = on ? (parseInt(document.getElementById('logms').value, 10) || 1000) : 0;
  const res = await fetch('/api/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ board: logBoard(), interval_ms }),
  });
  return res.json();
}
document.getElementById('logstart').onclick = () => setLog(true);
document.getElementById('logstop').onclick = () => setLog(false);
document.getElementById('logclear').onclick = () => { logPane.textContent = ''; };

new EventSource('/logs').onmessage = (event) => {
  const { board, line } = JSON.parse(event.data);
  logPane.textContent += `${board}: ${line}\n`;
  logPane.scrollTop = logPane.scrollHeight;
};
</script>
</body>
</html>
